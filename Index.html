<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Explorer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Segoe UI',sans-serif; }

#c { display:block; }

/* Tooltip */
#tip {
  position:fixed; z-index:20; pointer-events:none;
  background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.3);
  backdrop-filter:blur(8px); border-radius:6px;
  padding:6px 14px; font-size:13px; color:#fff; letter-spacing:0.05em;
  transform:translate(-50%,-160%); opacity:0; transition:opacity 0.15s;
  white-space:nowrap;
}
#tip.on { opacity:1; }

/* Panel */
#panel {
  position:fixed; right:0; top:0; bottom:0; width:340px; z-index:30;
  background:rgba(5,10,20,0.88); border-left:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(24px); transform:translateX(100%);
  transition:transform 0.35s cubic-bezier(.23,1,.32,1);
  display:flex; flex-direction:column;
}
#panel.on { transform:none; }

#ph { padding:22px 20px 16px; border-bottom:1px solid rgba(255,255,255,0.08); }
#pclose {
  float:right; background:none; border:1px solid rgba(255,255,255,0.15);
  color:#aaa; width:28px; height:28px; border-radius:50%; cursor:pointer;
  font-size:13px; display:flex; align-items:center; justify-content:center;
  transition:all .2s;
}
#pclose:hover { border-color:#00cfff; color:#00cfff; }
#pflag { font-size:2rem; display:block; margin-bottom:6px; }
#pname { font-size:1.4rem; font-weight:700; color:#fff; }
#psub { font-size:11px; color:#556; margin-top:2px; letter-spacing:.08em; text-transform:uppercase; }

#tabs { display:flex; border-bottom:1px solid rgba(255,255,255,0.08); }
.tb {
  flex:1; padding:10px 4px; background:none; border:none; color:#556;
  font-size:11px; letter-spacing:.07em; text-transform:uppercase; cursor:pointer;
  border-bottom:2px solid transparent; transition:all .2s;
}
.tb.on { color:#00cfff; border-bottom-color:#00cfff; }

#pcontent {
  flex:1; overflow-y:auto; padding:20px;
  scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.1) transparent;
}

.lbl {
  font-size:10px; letter-spacing:.12em; text-transform:uppercase;
  color:#00cfff; margin-bottom:10px;
}
.body-text { font-size:13px; line-height:1.75; color:#99b0c8; }

.fg { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.fc {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  border-radius:8px; padding:10px;
}
.fe { font-size:1.4rem; display:block; margin-bottom:4px; }
.fn { font-size:12px; font-weight:600; color:#ddd; }
.fd { font-size:11px; color:#556; margin-top:2px; }

.pl { display:flex; flex-direction:column; gap:8px; }
.pc {
  background:rgba(255,100,40,0.06); border:1px solid rgba(255,100,40,0.15);
  border-radius:8px; padding:10px 12px; display:flex; gap:10px; align-items:flex-start;
}
.pi { font-size:1.3rem; flex-shrink:0; }
.pn { font-size:12px; font-weight:700; color:#ff8055; margin-bottom:2px; }
.pd { font-size:11px; color:#556; line-height:1.5; }

.spin {
  width:32px; height:32px; border:2px solid rgba(255,255,255,0.1);
  border-top-color:#00cfff; border-radius:50%;
  animation:sp .7s linear infinite; margin:60px auto;
}
@keyframes sp { to { transform:rotate(360deg); } }

/* Zoom */
#zc { position:fixed; bottom:30px; left:20px; z-index:10; display:flex; flex-direction:column; gap:5px; }
.zb {
  width:36px; height:36px; background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15);
  color:#fff; border-radius:7px; cursor:pointer; font-size:1.1rem;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); transition:all .2s;
}
.zb:hover { border-color:#00cfff; color:#00cfff; }

/* Coords */
#coord {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  z-index:10; font-size:11px; color:rgba(255,255,255,0.35);
  background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08);
  border-radius:20px; padding:5px 14px; letter-spacing:.07em;
  font-family:monospace;
}

/* Logo */
#logo {
  position:fixed; top:18px; left:20px; z-index:10;
  font-size:13px; font-weight:700; letter-spacing:.15em;
  color:rgba(255,255,255,0.6); text-transform:uppercase;
}
#logo span { color:#00cfff; }

/* Hint */
#hint {
  position:fixed; top:18px; right:20px; z-index:10;
  font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:.08em;
}
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="tip"></div>
<div id="logo">EARTH<span>·</span>EXPLORER</div>
<div id="hint">DRAG · SCROLL · CLICK</div>

<div id="panel">
  <div id="ph">
    <button id="pclose" onclick="closeP()">✕</button>
    <span id="pflag">🌍</span>
    <div id="pname">Country</div>
    <div id="psub">Click a country to explore</div>
  </div>
  <div id="tabs">
    <button class="tb on" onclick="setTab('history',this)">📜 History</button>
    <button class="tb" onclick="setTab('food',this)">🍽 Food</button>
    <button class="tb" onclick="setTab('places',this)">🏛 Places</button>
  </div>
  <div id="pcontent"><div class="spin"></div></div>
</div>

<div id="zc">
  <button class="zb" onclick="dz(1.15)">+</button>
  <button class="zb" onclick="dz(0.87)">−</button>
</div>
<div id="coord">LAT 0.00° · LON 0.00°</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Three.js Globe ──────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 2.5;

// Stars
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(6000);
for(let i=0;i<6000;i++) starPos[i]=(Math.random()-0.5)*600;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0xffffff,size:0.6})));

// Ambient + directional light (simulate sun)
scene.add(new THREE.AmbientLight(0x333355, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(5, 3, 5);
scene.add(sun);

// Load textures from NASA/open sources
const loader = new THREE.TextureLoader();
const earthTex  = loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg');
const bumpTex   = loader.load('https://unpkg.com/three-globe/example/img/earth-topology.png');
const specTex   = loader.load('https://unpkg.com/three-globe/example/img/earth-water.png');
const cloudTex  = loader.load('https://unpkg.com/three-globe/example/img/earth-clouds.png');
const nightTex  = loader.load('https://unpkg.com/three-globe/example/img/earth-night.jpg');

// Earth sphere
const earthGeo = new THREE.SphereGeometry(1, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({
  map: earthTex,
  bumpMap: bumpTex, bumpScale: 0.05,
  specularMap: specTex,
  specular: new THREE.Color(0x226688),
  shininess: 18,
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// Clouds
const cloudGeo = new THREE.SphereGeometry(1.01, 64, 64);
const cloudMat = new THREE.MeshPhongMaterial({
  map: cloudTex, transparent:true, opacity:0.38,
  depthWrite:false,
});
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
scene.add(clouds);

// Atmosphere glow
const atmGeo = new THREE.SphereGeometry(1.06, 64, 64);
const atmMat = new THREE.MeshPhongMaterial({
  color:0x4488ff, transparent:true, opacity:0.08,
  side:THREE.FrontSide, depthWrite:false,
});
scene.add(new THREE.Mesh(atmGeo, atmMat));

// ── GeoJSON overlay ────────────────────────────────────────────────
let geoData = null, hoveredCountry = null, selectedCountry = null;

async function loadGeo() {
  const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  const topo = await res.json();
  // We'll use D3 for country detection only
  await loadD3();
  geoData = topojson.feature(window._topo, window._topo.objects.countries).features;
  renderOverlay();
}

function loadD3() {
  return new Promise(res => {
    const s1 = Object.assign(document.createElement('script'),{src:'https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js'});
    const s2 = Object.assign(document.createElement('script'),{src:'https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js'});
    document.head.appendChild(s2);
    s2.onload = () => {
      document.head.appendChild(s1);
      s1.onload = async () => {
        const r = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
        window._topo = await r.json();
        res();
      };
    };
  });
}

// Country borders on globe using canvas texture
const borderCanvas = document.createElement('canvas');
borderCanvas.width = 2048; borderCanvas.height = 1024;
const bCtx = borderCanvas.getContext('2d');
const borderTex = new THREE.CanvasTexture(borderCanvas);
const borderMat = new THREE.MeshBasicMaterial({map:borderTex,transparent:true,depthWrite:false,opacity:1});
const borderMesh = new THREE.Mesh(new THREE.SphereGeometry(1.002,64,64), borderMat);
scene.add(borderMesh);

function latLonToCanvas(lat, lon) {
  const x = (lon + 180) / 360 * 2048;
  const y = (90 - lat) / 180 * 1024;
  return [x, y];
}

function drawBorders(highlightId, selectedId) {
  if (!geoData) return;
  bCtx.clearRect(0,0,2048,1024);

  // D3 path to canvas
  const proj = d3.geoEquirectangular().scale(2048/(2*Math.PI)).translate([1024,512]);
  const path = d3.geoPath(proj, bCtx);

  geoData.forEach(f => {
    const id = f.id?.toString().padStart(3,'0');
    bCtx.beginPath();
    path(f);
    if (id === selectedId) {
      bCtx.fillStyle = 'rgba(255,100,40,0.45)';
      bCtx.strokeStyle = 'rgba(255,120,60,0.9)';
      bCtx.lineWidth = 2;
    } else if (id === highlightId) {
      bCtx.fillStyle = 'rgba(0,200,255,0.3)';
      bCtx.strokeStyle = 'rgba(0,220,255,0.85)';
      bCtx.lineWidth = 1.5;
    } else {
      bCtx.fillStyle = 'rgba(0,0,0,0)';
      bCtx.strokeStyle = 'rgba(255,255,255,0.18)';
      bCtx.lineWidth = 0.5;
    }
    bCtx.fill();
    bCtx.stroke();
  });
  borderTex.needsUpdate = true;
}

function renderOverlay() { drawBorders(null, null); }

// ── Country names ─────────────────────────────────────────────────
const NAMES = {
  "004":"Afghanistan","008":"Albania","012":"Algeria","024":"Angola","032":"Argentina",
  "036":"Australia","040":"Austria","050":"Bangladesh","056":"Belgium","064":"Bhutan",
  "068":"Bolivia","076":"Brazil","100":"Bulgaria","116":"Cambodia","120":"Cameroon",
  "124":"Canada","144":"Sri Lanka","152":"Chile","156":"China","170":"Colombia",

const FLAGS = {
  "Afghanistan":"🇦🇫","Albania":"🇦🇱","Algeria":"🇩🇿","Angola":"🇦🇴","Argentina":"🇦🇷",
  "Australia":"🇦🇺","Austria":"🇦🇹","Bangladesh":"🇧🇩","Belgium":"🇧🇪","Bolivia":"🇧🇴",
  "Brazil":"🇧🇷","Bulgaria":"🇧🇬","Cambodia":"🇰🇭","Cameroon":"🇨🇲","Canada":"🇨🇦",
  "Chile":"🇨🇱","China":"🇨🇳","Colombia":"🇨🇴","DR Congo":"🇨🇩","Costa Rica":"🇨🇷",
  "Croatia":"🇭🇷","Cuba":"🇨🇺","Czech Republic":"🇨🇿","Denmark":"🇩🇰","Ecuador":"🇪🇨",
  "Egypt":"🇪🇬","Ethiopia":"🇪🇹","Finland":"🇫🇮","France":"🇫🇷","Germany":"🇩🇪",
  "Ghana":"🇬🇭","Greece":"🇬🇷","Guatemala":"🇬🇹","Haiti":"🇭🇹","Honduras":"🇭🇳",
  "Hungary":"🇭🇺","India":"🇮🇳","Indonesia":"🇮🇩","Iran":"🇮🇷","Iraq":"🇮🇶",
  "Ireland":"🇮🇪","Israel":"🇮🇱","Italy":"🇮🇹","Jamaica":"🇯🇲","Japan":"🇯🇵",
  "Jordan":"🇯🇴","Kazakhstan":"🇰🇿","Kenya":"🇰🇪","North Korea":"🇰🇵","South Korea":"🇰🇷",
  "Kuwait":"🇰🇼","Laos":"🇱🇦","Lebanon":"🇱🇧","Libya":"🇱🇾","Mexico":"🇲🇽",
  "Mongolia":"🇲🇳","Morocco":"🇲🇦","Nepal":"🇳🇵","Netherlands":"🇳🇱","New Zealand":"🇳🇿",
  "Nigeria":"🇳🇬","Norway":"🇳🇴","Pakistan":"🇵🇰","Panama":"🇵🇦","Paraguay":"🇵🇾",
  "Peru":"🇵🇪","Philippines":"🇵🇭","Poland":"🇵🇱","Portugal":"🇵🇹","Qatar":"🇶🇦",
  "Romania":"🇷🇴","Russia":"🇷🇺","Rwanda":"🇷🇼","Saudi Arabia":"🇸🇦","Senegal":"🇸🇳",
  "Somalia":"🇸🇴","South Africa":"🇿🇦","Spain":"🇪🇸","Sudan":"🇸🇩","Sweden":"🇸🇪",
  "Switzerland":"🇨🇭","Syria":"🇸🇾","Thailand":"🇹🇭","Turkey":"🇹🇷","Uganda":"🇺🇬",
  "Ukraine":"🇺🇦","United Arab Emirates":"🇦🇪","United Kingdom":"🇬🇧","United States":"🇺🇸",
  "Uruguay":"🇺🇾","Venezuela":"🇻🇪","Vietnam":"🇻🇳","Yemen":"🇾🇪","Zambia":"🇿🇲",
  "Zimbabwe":"🇿🇼","Sri Lanka":"🇱🇰","Bhutan":"🇧🇹","El Salvador":"🇸🇻",
  "Mozambique":"🇲🇿","Namibia":"🇳🇦","Uzbekistan":"🇺🇿","Sierra Leone":"🇸🇱",
  "Oman":"🇴🇲","Laos":"🇱🇦"
};

// ── Mouse Interaction ─────────────────────────────────────────────
const tip = document.getElementById('tip');
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDrag=false, lastX=0, lastY=0, velX=0, velY=0;
let zoom=2.5;
let hoveredId=null, selectedId=null;

function onMouseMove(e) {
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;

  if (isDrag) {
    const dx = e.clientX-lastX, dy = e.clientY-lastY;
    velY = dx*0.003; velX = dy*0.003;
    earth.rotation.y += velY;
    earth.rotation.x += velX;
    clouds.rotation.y += velY;
    clouds.rotation.x += velX;
    borderMesh.rotation.copy(earth.rotation);
    lastX=e.clientX; lastY=e.clientY;
    tip.classList.remove('on'); return;
  }

  // Raycast
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(earth);
  if (hits.length && geoData) {
    const uv = hits[0].uv;
    const lon = uv.x*360-180;
    const lat = (1-uv.y)*180-90;
    document.getElementById('coord').textContent =
      `LAT ${lat.toFixed(2)}° · LON ${lon.toFixed(2)}°`;

    let found=null;
    if (window.d3) {
      for (const f of geoData) {
        if (d3.geoContains(f,[lon,lat])) { found=f; break; }
      }
    }
    const newId = found ? found.id?.toString().padStart(3,'0') : null;
    if (newId !== hoveredId) {
      hoveredId = newId;
      drawBorders(hoveredId, selectedId);
    }
    if (found && NAMES[newId]) {
      tip.textContent = NAMES[newId];
      tip.style.left = e.clientX+'px';
      tip.style.top = e.clientY+'px';
      tip.classList.add('on');
      canvas.style.cursor='pointer';
    } else {
      tip.classList.remove('on');
      canvas.style.cursor='grab';
    }
  } else {
    tip.classList.remove('on');
    canvas.style.cursor='grab';
    if (hoveredId) { hoveredId=null; drawBorders(null, selectedId); }
  }
}

canvas.addEventListener('mousedown', e=>{
  isDrag=true; lastX=e.clientX; lastY=e.clientY; velX=velY=0;
  canvas.style.cursor='grabbing';
});
canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('mouseup', e=>{
  const moved = Math.abs(e.clientX-lastX)<5 && Math.abs(e.clientY-lastY)<5;
  isDrag=false; canvas.style.cursor='grab';
  if (moved && hoveredId && NAMES[hoveredId]) openPanel(hoveredId);
});
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  zoom = Math.max(1.2, Math.min(8, zoom*(e.deltaY>0?1.1:0.91)));
  camera.position.z = zoom;
},{passive:false});

// Touch
let lt, ld;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===1){isDrag=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;lt={x:lastX,y:lastY,t:Date.now()};}
  if(e.touches.length===2){isDrag=false;ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDrag){
    const dx=e.touches[0].clientX-lastX,dy=e.touches[0].clientY-lastY;
    earth.rotation.y+=dx*0.003;earth.rotation.x+=dy*0.003;
    clouds.rotation.y+=dx*0.003;clouds.rotation.x+=dy*0.003;
    borderMesh.rotation.copy(earth.rotation);
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  }
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoom=Math.max(1.2,Math.min(8,zoom*(ld/d)));camera.position.z=zoom;ld=d;
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{isDrag=false;});

// ── Panel ─────────────────────────────────────────────────────────
let curCountry=null, curTab='history', cache={};

function openPanel(id) {
  selectedId=id; curCountry=NAMES[id]; cache={};
  drawBorders(hoveredId, selectedId);
  document.getElementById('pflag').textContent = FLAGS[curCountry]||'🌍';
  document.getElementById('pname').textContent = curCountry;
  document.getElementById('psub').textContent = 'Explore this country';
  document.getElementById('panel').classList.add('on');
  document.querySelectorAll('.tb').forEach((b,i)=>b.classList.toggle('on',i===0));
  curTab='history'; loadTab('history');
}

function closeP() {
  document.getElementById('panel').classList.remove('on');
  selectedId=null; curCountry=null;
  drawBorders(hoveredId, null);
}

function setTab(tab, el) {
  curTab=tab;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  loadTab(tab);
}

async function loadTab(tab) {
  const key=curCountry+'_'+tab;
  if(cache[key]){render(tab,cache[key]);return;}
  document.getElementById('pcontent').innerHTML='<div class="spin"></div>';
  const prompts = {
    history:`Brief 3-sentence history of ${curCountry}. Fascinating highlights only.`,
    food:`4 famous foods of ${curCountry}. JSON only, no markdown: [{"emoji":"","name":"","desc":""}]`,
    places:`4 famous places in ${curCountry}. JSON only, no markdown: [{"icon":"","name":"","desc":""}]`
  };
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,
        messages:[{role:'user',content:prompts[tab]}]})
    });
    const d = await r.json();
    const txt = d.content?.map(c=>c.text||'').join('')||'';
    cache[key]=txt; render(tab,txt);
  } catch { document.getElementById('pcontent').innerHTML='<p style="color:#556;font-size:12px;padding:10px">Could not load data.</p>'; }
}

function render(tab, text) {
  const el = document.getElementById('pcontent');
  if(tab==='history'){
    el.innerHTML=`<div class="lbl">Historical Overview</div><div class="body-text">${text.trim()}</div>`;
  } else if(tab==='food') {
    try {
      const d=JSON.parse(text.replace(/```json|```/g,'').trim());
      el.innerHTML=`<div class="lbl">Famous Cuisine</div><div class="fg">${d.map(f=>`<div class="fc"><span class="fe">${f.emoji}</span><div class="fn">${f.name}</div><div class="fd">${f.desc}</div></div>`).join('')}</div>`;
    } catch { el.innerHTML=`<div class="body-text">${text}</div>`; }
  } else {
    try {
      const d=JSON.parse(text.replace(/```json|```/g,'').trim());
      el.innerHTML=`<div class="lbl">Must-Visit Places</div><div class="pl">${d.map(p=>`<div class="pc"><div class="pi">${p.icon}</div><div><div class="pn">${p.name}</div><div class="pd">${p.desc}</div></div></div>`).join('')}</div>`;
    } catch { el.innerHTML=`<div class="body-text">${text}</div>`; }
  }
}

function dz(f){zoom=Math.max(1.2,Math.min(8,zoom*f));camera.position.z=zoom;}

// ── Animation ─────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if(!isDrag){
    earth.rotation.y += velY*0.97; earth.rotation.x += velX*0.97;
    velY*=0.97; velX*=0.97;
    clouds.rotation.copy(earth.rotation);
    clouds.rotation.y += 0.0001; // slow cloud drift
    borderMesh.rotation.copy(earth.rotation);
  }
  renderer.render(scene, camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

animate();
loadGeo();
</script>
